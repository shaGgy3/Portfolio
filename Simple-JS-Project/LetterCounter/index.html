<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Letter-Counter</title>
</head>
<body>
    <div class="container">
        <form class="form" id="form">
            <h1 class="header">Real-time Character Counter</h1>
            <textarea id="textArea" cols="30" rows="5"
            placeholder="Please write here..." maxlength="100"></textarea>
        <div class="counter">
            <h4 class="total" id="total">Total Character: 0</h4>
            <h4 class="remain" id="remain">Remainig: 0</h4>
        </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
